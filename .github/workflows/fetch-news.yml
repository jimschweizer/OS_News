name: Fetch news twice daily

on:
  schedule:
    # Runs ~7am and ~6pm US Central (UTC-5/-6 depending on DST).
    - cron: "0 12 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - run: npm run fetch-news

      - name: Commit updated news.json
        run: |
          git config user.name "os-news-bot"
          git config user.email "os-news-bot@users.noreply.github.com"
          git add data/news.json
          git diff --cached --quiet || git commit -m "chore: refresh news data"
          git push
