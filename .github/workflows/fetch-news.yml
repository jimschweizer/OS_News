name: Fetch news twice daily

on:
  schedule:
    # Runs at 6:00 AM CDT (11:00 UTC) and 5:30 PM CDT (22:30 UTC)
    - cron: "0 11 * * *"
    - cron: "30 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install

      - run: npm run fetch-news

      - name: Commit updated news.json
        run: |
          git config user.name "os-news-bot"
          git config user.email "os-news-bot@users.noreply.github.com"
          git add data/news.json
          git diff --cached --quiet || git commit -m "chore: refresh news data"
          git push
